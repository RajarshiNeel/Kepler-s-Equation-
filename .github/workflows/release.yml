name: Build and Release PDF

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Compile LaTeX
      uses: xu-cheng/latex-action@v3
      with:
        root_file: main.tex

    - name: Create Release and Upload PDF
      uses: softprops/action-gh-release@v2
      with:
        files: main.pdf
